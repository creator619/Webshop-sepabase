<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Webshop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-nav {
            background: #1a1a1a;
            padding: 15px 5%;
            display: flex;
            gap: 20px;
            color: white;
        }
        .admin-nav .tab {
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 4px;
        }
        .admin-nav .tab.active {
            background: var(--accent);
            color: black;
        }
        .admin-container {
            padding: 40px 5%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f4f4f4;
            font-weight: 700;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .status-pending { background: #ffeeba; color: #856404; }
        .status-shipped { background: #b8daff; color: #004085; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        
        .admin-form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: none;
        }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .action-btn { cursor: pointer; border: none; background: none; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="admin-nav">
        <h2>Admin Panel</h2>
        <div class="tab active" data-tab="dashboard">Irányítópult</div>
        <div class="tab" data-tab="orders">Rendelések</div>
        <div class="tab" data-tab="products">Termékek</div>
        <div style="margin-left: auto;">
            <button onclick="window.location.href='index.html'" class="btn-add" style="background: #333;">Vissza a bolthoz</button>
        </div>
    </div>

    <div class="admin-container">
        <!-- IRÁNYÍTÓPULT TAB -->
        <div id="dashboard-tab" class="tab-content">
            <h3>Üdvözöljük az Admin felületen!</h3>
            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                <div class="stat-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow);">
                    <h4 style="color: #666; margin-bottom: 10px;">Összes bevétel</h4>
                    <p id="stat-revenue" style="font-size: 1.5rem; font-weight: 700;">0 Ft</p>
                </div>
                <div class="stat-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow);">
                    <h4 style="color: #666; margin-bottom: 10px;">Rendelések száma</h4>
                    <p id="stat-orders" style="font-size: 1.5rem; font-weight: 700;">0 db</p>
                </div>
                <div class="stat-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow);">
                    <h4 style="color: #666; margin-bottom: 10px;">Vásárlók száma</h4>
                    <p id="stat-customers" style="font-size: 1.5rem; font-weight: 700;">0 fő</p>
                </div>
            </div>
        </div>

        <!-- RENDELÉSEK TAB -->
        <div id="orders-tab" class="tab-content" style="display: none;">
            <h3>Összes rendelés</h3>
            <table id="admin-orders-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vevő</th>
                        <th>Összeg</th>
                        <th>Dátum</th>
                        <th>Státusz</th>
                        <th>Művelet</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- TERMÉKEK TAB -->
        <div id="products-tab" class="tab-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Termékek kezelése</h3>
                <button class="btn-add" onclick="showProductForm()">+ Új termék</button>
            </div>

            <div id="product-form" class="admin-form">
                <h4 id="form-title">Új termék hozzáadása</h4>
                <input type="hidden" id="p-id">
                <input type="text" id="p-name" placeholder="Termék neve">
                <input type="number" id="p-price" placeholder="Ár (Ft)">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <input type="text" id="p-image" placeholder="Kép URL (vagy tölts fel egyet)" style="margin-bottom: 0;">
                    <input type="file" id="p-upload" style="display: none;" onchange="uploadImage(this)">
                    <button type="button" class="btn-add" onclick="document.getElementById('p-upload').click()" style="background: #555; white-space: nowrap;">Feltöltés</button>
                </div>
                <input type="number" id="p-stock" placeholder="Készlet (db)">
                <select id="p-category" required>
                    <option value="1">Ing</option>
                    <option value="2">Zakó</option>
                    <option value="3">Nadrág</option>
                    <option value="4">Cipő</option>
                </select>
                <textarea id="p-desc" placeholder="Leírás"></textarea>
                <button class="btn-add" onclick="saveProduct()">Mentés</button>
                <button class="btn-add" style="background: #ccc; color: #333;" onclick="hideProductForm()">Mégse</button>
            </div>

            <table id="admin-products-table">
                <thead>
                    <tr>
                        <th>Kép</th>
                        <th>Név</th>
                        <th>Ár</th>
                        <th>Készlet</th>
                        <th>Kategória</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script> <!-- showToast funkció miatt -->
    <script src="admin.js"></script>
</body>
</html>
